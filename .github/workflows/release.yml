name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/versentry
            ${{ secrets.DOCKERHUB_USERNAME }}/versentry
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Versentry
            org.opencontainers.image.description=Notify-only Docker image update monitor. Alerts via Telegram, Discord, webhook, or stdout.
            org.opencontainers.image.source=https://github.com/BlackRaincoat/versentry
            org.opencontainers.image.licenses=MIT

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: |
            index:org.opencontainers.image.description=Notify-only Docker image update monitor. Alerts via Telegram, Discord, webhook, or stdout.
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}

      # After images succeed — create the GitHub Release for this tag.
      - name: Extract CHANGELOG section for tag
        id: changelog
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          NOTES_FILE=release-notes.md
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          # Drop leading/trailing blank lines
          if [ -s "$NOTES_FILE" ]; then
            awk 'NF{p=1} p' "$NOTES_FILE" | awk '
              { lines[NR]=$0 }
              END {
                end=NR
                while (end > 0 && lines[end] ~ /^[[:space:]]*$/) end--
                for (i = 1; i <= end; i++) print lines[i]
              }
            ' > "${NOTES_FILE}.trim"
            mv "${NOTES_FILE}.trim" "$NOTES_FILE"
          fi
          if [ -s "$NOTES_FILE" ]; then
            echo "notes_ok=true" >> "$GITHUB_OUTPUT"
            echo "Extracted CHANGELOG section for ${VERSION} ($(wc -l < "$NOTES_FILE") lines)"
          else
            echo "notes_ok=false" >> "$GITHUB_OUTPUT"
            echo "No CHANGELOG section for ${VERSION}; will use GitHub-generated notes"
          fi

      - name: Create GitHub Release (CHANGELOG body)
        if: steps.changelog.outputs.notes_ok == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Versentry ${{ github.ref_name }}
          body_path: release-notes.md
          generate_release_notes: false

      - name: Create GitHub Release (generated notes fallback)
        if: steps.changelog.outputs.notes_ok != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Versentry ${{ github.ref_name }}
          generate_release_notes: true
