#      url: "https://ntfy.sh"
#      topic: "my-secret-topic"
#      priority: 3
#      tags: ["package"]
#      mode: digest
#      token: ""
#      proxy: "socks5://user:pass@host:1080"
#      item_template: "**{{.Container}}**: {{.Change}}\n\n"
