# Env: VERSENTRY_NTFY_URL, VERSENTRY_NTFY_TOPIC, VERSENTRY_NTFY_TOKEN, VERSENTRY_NTFY_PROXY

# --- Rules (optional) ---
# Image axis: per-repo include filters and/or track: digest.
# Config rule for an image overrides versentry.include / versentry.track on all
# containers of that image — see docs/rules.md and docs/configuration.md (axes).
#
# rules:
#   - image: "postgres"
#     include: "^17\\.\\d+-alpine3\\.\\d+$"
#   - image: "chatwoot/chatwoot"
#     include: "^v\\d+\\.\\d+\\.\\d+-ce$"
#   - image: "valkey/valkey"
#     track: digest
# floating tag rebuilds (e.g. 9-alpine), not semver "newer"

# --- Exclude containers (optional) ---
# Exact Docker names (docker ps) to skip. Complements label versentry.watch=false
# (either source excludes; config cannot force-include against the label).
#
# exclude_containers:
#   - chatwoot-notify
#   - watch-test

# --- Timeouts ---
timeouts:
  provider: 10s
  registry: 30s

# registry_proxy: "socks5://user:pass@host:1080"
# Env: VERSENTRY_REGISTRY_PROXY

# --- Scheduling ---
interval: 12h
# schedule: "0 12 * * *"
# timezone: Europe/Paris
# cron only; ignored with interval-only mode
# Cron needs timezone in config or TZ env — see docs/configuration.md#tz-vs-timezone
# TZ in compose/docker is separate: it sets log timestamps for the whole container.

# --- State & health ---
# Notification state is internal (suppresses repeat alerts). Default: state.json next to this file.
# Docker image sets VERSENTRY_STATE_FILE=/data/state.json — mount a volume at /data; no YAML key needed.
# health_max_age: "3h"

log_level: info
