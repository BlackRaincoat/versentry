name: Feature request
description: Suggest an improvement within Versentry's scope
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do? Why is the current behavior insufficient?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits notify-only design (no auto-pull/restart)
          required: true
